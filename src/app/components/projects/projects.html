<section id="projects">
  <div class="proj-inner">
    <div class="section-header">
      <span class="section-label">Featured Projects</span>
      <h2 class="section-title">What I've Built</h2>
      <p class="section-sub">Personal projects and enterprise work that showcase my skills</p>
    </div>

    <div class="projects-grid">
      <div
        class="project-card"
        *ngFor="let project of projects"
        [class.featured]="project.featured"
      >
        <div class="card-top-bar" [style.background]="project.accent"></div>

        <div class="card-body">
          <div class="card-header">
            <div class="project-icon" [style.background]="project.iconBg">
              <span>{{ project.icon }}</span>
            </div>
            <div class="card-links">
              <a
                *ngIf="project.github"
                [href]="project.github"
                target="_blank"
                class="icon-link"
                aria-label="GitHub"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                  />
                </svg>
              </a>
              <a
                *ngIf="project.live"
                [href]="project.live"
                target="_blank"
                class="icon-link"
                aria-label="Live demo"
              >
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" />
                  <polyline points="15,3 21,3 21,9" />
                  <line x1="10" y1="14" x2="21" y2="3" />
                </svg>
              </a>
            </div>
          </div>

          <div class="project-type">{{ project.type }}</div>
          <h3 class="project-name">{{ project.name }}</h3>
          <p class="project-desc">{{ project.description }}</p>

          <ul class="project-highlights">
            <li *ngFor="let h of project.highlights"><span class="h-dot"></span>{{ h }}</li>
          </ul>

          <div class="project-tags">
            <span class="p-tag" *ngFor="let tag of project.tags">{{ tag }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
