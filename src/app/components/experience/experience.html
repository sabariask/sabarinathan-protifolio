<section id="experience">
  <div class="exp-inner">
    <div class="section-header">
      <span class="section-label">Work Experience</span>
      <h2 class="section-title">Career at Accenture</h2>
      <p class="section-sub">4+ years building enterprise applications across 3 projects</p>
    </div>

    <div class="timeline">
      <div class="timeline-item" *ngFor="let job of jobs; let last = last">
        <div class="timeline-left">
          <div class="timeline-dot" [class.active]="job.current"></div>
          <div class="timeline-line" *ngIf="!last"></div>
        </div>
        <div class="timeline-card" [class.current]="job.current">
          <div class="card-header">
            <div>
              <div class="job-meta">
                <span class="company">{{ job.company }}</span>
                <span *ngIf="job.current" class="current-badge">Current</span>
                <span *ngIf="job.confidential" class="conf-badge">Client Confidential</span>
              </div>
              <h3 class="job-title">{{ job.title }}</h3>
              <div class="job-info">
                <span class="job-period">
                  <svg
                    width="13"
                    height="13"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                  </svg>
                  {{ job.period }}
                </span>
                <span class="job-type">{{ job.type }}</span>
              </div>
            </div>
          </div>

          <p class="job-desc">{{ job.description }}</p>

          <ul class="job-achievements">
            <li *ngFor="let item of job.achievements">
              <span class="ach-dot"></span>
              {{ item }}
            </li>
          </ul>

          <div class="job-tags">
            <span class="tech-tag" *ngFor="let tech of job.tech">{{ tech }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
